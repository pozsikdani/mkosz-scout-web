name: Napi adat-export és deploy (NB1B Piros)

on:
  schedule:
    - cron: '30 7 * * *'  # 7:30 UTC — mkosz-stats import (6:30 UTC) után
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Python csomagok telepítése
        run: pip install requests beautifulsoup4 pillow

      - name: Stats DB letöltése (frissített mkosz-stats)
        run: git clone --depth 1 https://github.com/pozsikdani/mkosz-stats.git /tmp/mkosz-stats

      - name: Indexek újraépítése (a forrás-DB méret-okból index nélkül van commit-elve)
        run: |
          sqlite3 /tmp/mkosz-stats/mkosz_stats.sqlite <<'SQL'
          CREATE INDEX IF NOT EXISTS idx_matches_comp        ON matches(comp_code, season);
          CREATE INDEX IF NOT EXISTS idx_matches_date        ON matches(match_date);
          CREATE INDEX IF NOT EXISTS idx_pbp_gamecode        ON pbp_events(gamecode);
          CREATE INDEX IF NOT EXISTS idx_pbp_playercode      ON pbp_events(playercode);
          CREATE INDEX IF NOT EXISTS idx_pf_gamecode         ON personal_fouls(gamecode);
          CREATE INDEX IF NOT EXISTS idx_pgs_gamecode        ON player_game_stats(gamecode);
          CREATE INDEX IF NOT EXISTS idx_pgs_playercode      ON player_game_stats(playercode);
          CREATE INDEX IF NOT EXISTS idx_se_gamecode         ON scoring_events(gamecode);
          CREATE INDEX IF NOT EXISTS idx_shots_gamecode      ON shots(gamecode);
          CREATE INDEX IF NOT EXISTS idx_shots_playercode    ON shots(playercode);
          CREATE INDEX IF NOT EXISTS idx_subs_gamecode       ON substitutions(gamecode);
          SQL

      - name: Tabella scrape (mkosz.hu)
        run: python3 scripts/scrape_standings.py

      - name: Roster scrape (mkosz.hu csapat oldalak)
        run: python3 scripts/scrape_rosters.py

      - name: Játékos-fotók letöltése (idempotens, cache-elt)
        run: python3 scripts/download_player_photos.py

      - name: Per-csapat exportok (DB-ből)
        env:
          DB_PATH: /tmp/mkosz-stats/mkosz_stats.sqlite
        run: |
          python3 scripts/export_team_matches.py     --db "$DB_PATH"
          python3 scripts/export_team_players.py     --db "$DB_PATH"
          python3 scripts/export_team_shots.py       --db "$DB_PATH"
          python3 scripts/export_team_player_shots.py --db "$DB_PATH"
          python3 scripts/export_team_possessions.py --db "$DB_PATH"
          python3 scripts/export_team_lineups.py     --db "$DB_PATH"
          python3 scripts/export_team_lineup_nrtg.py --db "$DB_PATH"
          python3 scripts/export_league_comparison.py --db "$DB_PATH"

      - name: Commit és push ha változott
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/data/ static/players/
          git diff --staged --quiet || (
            git commit -m "Napi adat-frissítés (auto): $(date +%Y-%m-%d)" &&
            git push
          )

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          BASE_PATH: /mkosz-scout-web
          NODE_ENV: production

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 1800000
